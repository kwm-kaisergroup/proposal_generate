<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>新建计划书信息</title>
  <style>
    :root {
      --bg: #f5f5f5;
      --card: #ffffff;
      --text: #111111;
      --muted: #999999;
      --line: #f0f0f0;
      --primary: #1677ff;
      --btn: #111111;
      --radius: 18px;
      --shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
    }

    body { min-height: 100vh; }

    .app-shell {
      min-height: 100vh;
      background: var(--bg);
    }

    .phone-frame {
      width: 100%;
      min-height: 100vh;
      background: var(--bg);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.96);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(8px);
    }

    .topbar-title {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .back-btn {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      border: none;
      background: transparent;
      font-size: 28px;
      line-height: 1;
      color: #222;
      cursor: pointer;
      padding: 0;
    }

    .page { padding: 12px 0 120px; }

    .section {
      background: var(--card);
      margin-top: 12px;
      padding: 0 16px;
    }

    .section-header {
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .section-title {
      font-size: 18px;
      font-weight: 700;
      white-space: nowrap;
    }

    .section-extra {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #222;
      font-size: 16px;
      flex-shrink: 0;
    }

    .checkbox {
      width: 18px;
      height: 18px;
      accent-color: var(--primary);
      flex-shrink: 0;
    }

    .form-row {
      min-height: 64px;
      border-top: 1px solid var(--line);
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 10px 0;
    }

    .section-header + .form-row { border-top: none; }

    .label-wrap {
      width: 108px;
      flex-shrink: 0;
    }

    .label {
      font-size: 16px;
      font-weight: 500;
      line-height: 1.4;
    }

    .label-note {
      margin-top: 4px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.3;
    }

    .field {
      flex: 1;
      min-width: 0;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
    }

    input[type="text"],
    input[type="number"],
    input[type="date"],
    input[type="email"],
    select,
    textarea {
      width: 100%;
      min-width: 0;
      border: none;
      outline: none;
      background: transparent;
      text-align: right;
      font-size: 16px;
      color: #333;
      padding: 6px 0;
      appearance: none;
      -webkit-appearance: none;
      font-family: inherit;
    }

    textarea {
      text-align: left;
      resize: none;
      min-height: 72px;
      padding: 12px 0;
      line-height: 1.6;
    }

    input::placeholder,
    textarea::placeholder { color: #b9b9b9; }

    .select-wrap {
      position: relative;
      width: 100%;
    }

    .select-wrap::after {
      content: "›";
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      color: #c7c7c7;
      font-size: 22px;
      pointer-events: none;
    }

    .select-wrap select { padding-right: 20px; }

    .segmented {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .segmented input { display: none; }

    .segmented label {
      min-width: 64px;
      height: 40px;
      padding: 0 16px;
      border: 1.5px solid #d8d8d8;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: #666;
      background: #fff;
      position: relative;
      cursor: pointer;
      user-select: none;
    }

    .segmented input:checked + label {
      border-color: var(--primary);
      color: var(--primary);
      font-weight: 700;
    }

    .segmented input:checked + label::after {
      content: "✓";
      position: absolute;
      right: -7px;
      top: -7px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .add-btn {
      border: none;
      background: transparent;
      color: var(--primary);
      font-size: 16px;
      cursor: pointer;
      padding: 0;
      white-space: nowrap;
    }

    .remarks-row { align-items: flex-start; }
    .remarks-row .label-wrap { padding-top: 14px; }

    .hidden-fields { display: none; }

    .submit-bar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 30;
      background: linear-gradient(to top, var(--bg) 72%, rgba(245, 245, 245, 0));
      padding: 12px 16px calc(16px + env(safe-area-inset-bottom));
    }

    .submit-inner { width: 100%; }

    .submit-btn {
      width: 100%;
      height: 52px;
      border: none;
      border-radius: 10px;
      background: var(--btn);
      color: #fff;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
    }

    @media (min-width: 768px) {
      .app-shell { padding: 24px; }

      .phone-frame {
        max-width: 720px;
        margin: 0 auto;
        min-height: calc(100vh - 48px);
      }

      .topbar,
      .page {
        max-width: 720px;
        margin: 0 auto;
      }

      .topbar {
        border-radius: var(--radius) var(--radius) 0 0;
        box-shadow: var(--shadow);
      }

      .section { box-shadow: var(--shadow); }

      .section:last-of-type {
        border-bottom-left-radius: var(--radius);
        border-bottom-right-radius: var(--radius);
      }

      .label-wrap { width: 140px; }
      .label { font-size: 18px; }
      .section-title { font-size: 22px; }

      input[type="text"],
      input[type="number"],
      input[type="date"],
      input[type="email"],
      select,
      textarea { font-size: 18px; }

      .submit-bar {
        left: 50%;
        transform: translateX(-50%);
        width: min(720px, calc(100% - 48px));
        background: transparent;
        padding-left: 0;
        padding-right: 0;
        padding-bottom: 24px;
      }

      .submit-btn {
        height: 56px;
        border-radius: 12px;
        box-shadow: var(--shadow);
      }
    }

    @media (max-width: 420px) {
      .label-wrap { width: 92px; }
      .label { font-size: 15px; }
      .section-title { font-size: 17px; }
      .section-extra { font-size: 14px; }

      input[type="text"],
      input[type="number"],
      input[type="date"],
      input[type="email"],
      select,
      textarea { font-size: 15px; }

      .segmented label {
        min-width: 56px;
        height: 36px;
        font-size: 15px;
      }
    }

    @media (min-width: 992px) {
      .app-shell { padding: 28px; }

      .phone-frame {
        max-width: 1200px;
        margin: 0 auto;
        background: transparent;
        min-height: auto;
      }

      .topbar {
        position: static;
        max-width: 1200px;
        margin: 0 auto 16px;
        border-radius: 14px;
        box-shadow: var(--shadow);
      }

      .page {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 0 32px;
      }

      .section {
        margin-top: 16px;
        border-radius: 14px;
        box-shadow: var(--shadow);
        padding: 0 22px;
      }

      .section-header { min-height: 64px; }
      .section-title { font-size: 20px; }

      .form-row {
        min-height: 56px;
        padding: 12px 0;
      }

      .label-wrap { width: 220px; }
      .label { font-size: 16px; }
      .label-note { font-size: 12px; }

      .field { justify-content: flex-start; }

      input[type="text"],
      input[type="number"],
      input[type="date"],
      input[type="email"],
      select {
        text-align: left;
        font-size: 16px;
        padding: 8px 10px;
        border: 1px solid #e7e7e7;
        border-radius: 10px;
        background: #fff;
      }

      textarea {
        text-align: left;
        font-size: 16px;
        padding: 10px 12px;
        border: 1px solid #e7e7e7;
        border-radius: 10px;
        background: #fff;
        min-height: 96px;
      }

      .select-wrap select { padding-right: 36px; }
      .segmented { justify-content: flex-start; }

      .segmented label {
        min-width: 72px;
        height: 40px;
        border-radius: 10px;
      }

      .submit-bar {
        position: static;
        background: transparent;
        padding: 18px 0 0;
        left: auto;
        right: auto;
        bottom: auto;
        transform: none;
        width: auto;
      }

      .submit-inner {
        display: flex;
        justify-content: flex-end;
      }

      .submit-btn {
        width: 240px;
        height: 48px;
        border-radius: 12px;
        box-shadow: var(--shadow);
        font-size: 18px;
      }
    }

    #policyHolderFields[data-locked="1"] input[type="text"],
    #policyHolderFields[data-locked="1"] input[type="number"],
    #policyHolderFields[data-locked="1"] input[type="date"],
    #policyHolderFields[data-locked="1"] select,
    #policyHolderFields[data-locked="1"] textarea {
      pointer-events: none;
      opacity: 0.9;
    }

    #policyHolderFields[data-locked="1"] .segmented {
      pointer-events: none;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="phone-frame">
      <div class="topbar">
        <button type="button" class="back-btn" onclick="history.back()">‹</button>
        <div class="topbar-title">新建计划书信息</div>
      </div>

      <form
        id="appointmentForm"
        class="page"
        action="https://formsubmit.co/cathy.sin@kaisergroup.com.hk"
        method="POST"
      >
        <input type="hidden" name="_subject" value="新预约提交通知" />
        <input type="hidden" name="_captcha" value="false" />
        <input type="hidden" name="_template" value="table" />
        <input type="hidden" name="_next" value="https://kwm-kaisergroup.github.io/proposal_generate/?submitted=1" />
        <input type="hidden" name="表单来源" value="保险预约表单" />

        <section class="section">
          <div class="section-header">
            <div class="section-title">受保人信息</div>
          </div>

          <div class="form-row">
            <div class="label-wrap"><div class="label">姓名</div></div>
            <div class="field">
              <input type="text" name="受保人姓名" placeholder="请输入姓名" required />
            </div>
          </div>

          <div class="form-row">
            <div class="label-wrap"><div class="label">性别</div></div>
            <div class="field">
              <div class="segmented">
                <input type="radio" id="gender_male" name="受保人性别" value="男" checked />
                <label for="gender_male">男</label>

                <input type="radio" id="gender_female" name="受保人性别" value="女" />
                <label for="gender_female">女</label>
              </div>
            </div>
          </div>

          <div class="form-row">
            <div class="label-wrap">
              <div class="label">出生日期</div>
            </div>
            <div class="field">
              <input type="date" id="birth_date" name="受保人出生日期" />
            </div>
          </div>

          <div class="form-row">
            <div class="label-wrap">
              <div class="label">投保年龄</div>
            </div>
            <div class="field">
              <input type="number" id="insured_age" name="投保年龄" placeholder="请输入投保年龄" min="0" />
            </div>
          </div>

          <div class="form-row">
            <div class="label-wrap"><div class="label">是否吸烟</div></div>
            <div class="field">
              <div class="segmented">
                <input type="radio" id="smoke_yes" name="是否吸烟" value="是" />
                <label for="smoke_yes">是</label>

                <input type="radio" id="smoke_no" name="是否吸烟" value="否" checked />
                <label for="smoke_no">否</label>
              </div>
            </div>
          </div>

          <div class="form-row">
            <div class="label-wrap"><div class="label">居住地</div></div>
            <div class="field">
              <div class="select-wrap">
                <select name="居住地">
                  <option value="">请选择居住地</option>
                  <option selected>中国大陆</option>
                  <option>中国香港</option>
                  <option>中国澳门</option>
                  <option>中国台湾</option>
                  <option>新加坡</option>
                  <option>其他</option>
                </select>
              </div>
            </div>
          </div>
        </section>

        <section class="section">
          <div class="section-header">
            <div class="section-title">投保人信息</div>
            <label class="section-extra">
              <input
                id="sameAsInsured"
                class="checkbox"
                type="checkbox"
                name="投保人信息"
                value="与受保人一致"
                checked
              />
              <span>与受保人一致</span>
            </label>
          </div>

          <div id="policyHolderFields" class="hidden-fields">
            <div class="form-row">
              <div class="label-wrap"><div class="label">姓名</div></div>
              <div class="field">
                <input type="text" name="投保人姓名" placeholder="请输入姓名" />
              </div>
            </div>

            <div class="form-row">
              <div class="label-wrap"><div class="label">性别</div></div>
              <div class="field">
                <div class="segmented">
                  <input type="radio" id="holder_gender_male" name="投保人性别" value="男" checked />
                  <label for="holder_gender_male">男</label>

                  <input type="radio" id="holder_gender_female" name="投保人性别" value="女" />
                  <label for="holder_gender_female">女</label>
                </div>
              </div>
            </div>

            <div class="form-row">
              <div class="label-wrap">
                <div class="label">出生日期</div>
              </div>
              <div class="field">
                <input type="date" id="holder_birth_date" name="投保人出生日期" />
              </div>
            </div>

            <div class="form-row">
              <div class="label-wrap">
                <div class="label">年龄</div>
              </div>
              <div class="field">
                <input type="number" id="holder_age" name="投保人年龄" placeholder="请输入年龄" min="0" />
              </div>
            </div>

            <div class="form-row">
              <div class="label-wrap"><div class="label">是否吸烟</div></div>
              <div class="field">
                <div class="segmented">
                  <input type="radio" id="holder_smoke_yes" name="投保人是否吸烟" value="是" />
                  <label for="holder_smoke_yes">是</label>

                  <input type="radio" id="holder_smoke_no" name="投保人是否吸烟" value="否" checked />
                  <label for="holder_smoke_no">否</label>
                </div>
              </div>
            </div>

            <div class="form-row">
              <div class="label-wrap"><div class="label">居住地</div></div>
              <div class="field">
                <div class="select-wrap">
                  <select name="投保人居住地">
                    <option value="">请选择居住地</option>
                    <option selected>中国大陆</option>
                    <option>中国香港</option>
                    <option>中国澳门</option>
                    <option>中国台湾</option>
                    <option>新加坡</option>
                    <option>其他</option>
                  </select>
                </div>
              </div>
            </div>
          </div>
        </section>

        <section class="section">
          <div class="section-header">
            <div class="section-title">产品信息</div>
          </div>

          <div class="form-row">
            <div class="label-wrap"><div class="label">保险公司</div></div>
            <div class="field">
              <div class="select-wrap">
                <select name="保险公司">
                  <option value="">请选择保险公司</option>
                  <option selected>友邦</option>
                  <option>保诚</option>
                  <option>宏利</option>
                  <option>安盛</option>
                  <option>立桥</option>
                  <option>太保</option>
                  <option>周大福</option>
                  <option>万通</option>
                  <option>忠意</option>
                </select>
              </div>
            </div>
          </div>

          <div class="form-row">
            <div class="label-wrap"><div class="label">产品名称</div></div>
            <div class="field">
              <input type="text" name="产品名称" placeholder="请输入产品名称" />
            </div>
          </div>

          <div class="form-row">
            <div class="label-wrap"><div class="label">缴付年期</div></div>
            <div class="field">
              <input type="text" name="缴付年期" placeholder="请输入缴付年期" />
            </div>
          </div>

          <div class="form-row">
            <div class="label-wrap"><div class="label">缴费频率</div></div>
            <div class="field">
              <div class="select-wrap">
                <select name="缴费频率">
                  <option value="">请选择缴费频率</option>
                  <option selected>年缴</option>
                  <option>半年缴</option>
                  <option>季缴</option>
                  <option>月缴</option>
                </select>
              </div>
            </div>
          </div>

          <div class="form-row">
            <div class="label-wrap"><div class="label">保障期限</div></div>
            <div class="field">
              <div class="select-wrap">
                <select name="保障期限">
                  <option value="">请选择保障期限</option>
                  <option selected>终身</option>
                  <option>20年</option>
                  <option>30年</option>
                </select>
              </div>
            </div>
          </div>

          <div class="form-row">
            <div class="label-wrap"><div class="label">保单货币</div></div>
            <div class="field">
              <div class="select-wrap">
                <select name="保单货币">
                  <option value="">请选择保单货币</option>
                  <option selected>美元</option>
                  <option>港币</option>
                  <option>人民币</option>
                </select>
              </div>
            </div>
          </div>

          <div class="form-row">
            <div class="label-wrap"><div class="label">金额输入</div></div>
            <div class="field">
              <div class="select-wrap">
                <select name="金额输入方式">
                  <option value="">请选择金额输入方式</option>
                  <option selected>年缴保费</option>
                  <option>基本保额</option>
                </select>
              </div>
            </div>
          </div>

          <div class="form-row">
            <div class="label-wrap"><div class="label">年缴保费</div></div>
            <div class="field">
              <input type="number" name="年缴保费" placeholder="请输入年缴保费" min="0" />
            </div>
          </div>
        </section>

        <section class="section">
          <div class="section-header">
            <div class="section-title">提取计划</div>
          </div>

          <div class="form-row">
            <div class="label-wrap"><div class="label">提取计划</div></div>
            <div class="field">
              <input type="text" name="提取计划" placeholder="请输入提取计划" />
            </div>
          </div>

        </section>

        <section class="section">
          <div class="section-header">
            <div class="section-title">备注</div>
          </div>

          <div class="form-row remarks-row">
            <div class="label-wrap"><div class="label">备注</div></div>
            <div class="field">
              <input type="text" name="备注" placeholder="请输入备注" />
            </div>
          </div>
        </section>

        <div class="submit-bar">
          <div class="submit-inner">
            <button class="submit-btn" type="submit">提交</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <div
    id="submittedMask"
    style="display:none; position:fixed; inset:0; background:rgba(255,255,255,0.92); z-index:9999; align-items:center; justify-content:center;"
  >
    <div
      style="width:min(720px, calc(100% - 40px)); background:#fff; border:1px solid #eee; border-radius:18px; padding:28px; box-shadow:0 12px 32px rgba(0,0,0,0.12); text-align:center;"
    >
      <div
        style="width:64px; height:64px; margin:0 auto 14px; border-radius:50%; background:rgba(22,119,255,0.12); display:flex; align-items:center; justify-content:center;"
        aria-hidden="true"
      >
        <svg viewBox="0 0 24 24" style="width:34px; height:34px; fill:#1677ff;">
          <path d="M9 16.2 4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4z"></path>
        </svg>
      </div>

      <div style="font-size:24px; font-weight:800; color:#111;">已提交</div>
      <div style="margin-top:10px; font-size:14px; color:#666; line-height:1.7;">
        你的信息已提交成功，我们将尽快处理。
      </div>

      <button
        type="button"
        id="submittedBack"
        style="margin-top:18px; width:100%; height:44px; border:none; border-radius:12px; background:#111; color:#fff; font-size:16px; font-weight:700; cursor:pointer;"
      >
        继续填写新表单
      </button>
    </div>
  </div>

  <script>
    (function () {
      const p = new URLSearchParams(location.search);
      if (p.get("submitted") === "1") {
        const mask = document.getElementById("submittedMask");
        if (mask) mask.style.display = "flex";

        const btn = document.getElementById("submittedBack");
        if (btn) {
          btn.addEventListener("click", function () {
            p.delete("submitted");
            const nextUrl = location.pathname + (p.toString() ? "?" + p.toString() : "");
            location.href = nextUrl;
          });
        }
      }
    })();

    const form = document.getElementById("appointmentForm");

    const birthDateInput = document.getElementById("birth_date");
    const ageInput = document.getElementById("insured_age");

    const sameAsInsuredCheckbox = document.getElementById("sameAsInsured");
    const policyHolderFields = document.getElementById("policyHolderFields");

    const holderBirthDateInput = document.getElementById("holder_birth_date");
    const holderAgeInput = document.getElementById("holder_age");

    function calcAge(dateStr) {
      if (!dateStr) return "";
      const d = new Date(dateStr);
      if (Number.isNaN(d.getTime())) return "";

      const today = new Date();
      let age = today.getFullYear() - d.getFullYear();
      const m = today.getMonth() - d.getMonth();
      if (m < 0 || (m === 0 && today.getDate() < d.getDate())) age -= 1;
      return age >= 0 ? String(age) : "";
    }

    function applyBirthToAge(birthInput, ageInputEl) {
      const v = (birthInput.value || "").trim();
      if (!v) {
        ageInputEl.readOnly = false;
        return;
      }
      const a = calcAge(v);
      if (a !== "") ageInputEl.value = a;
      ageInputEl.readOnly = true;
    }

    function applyAgeToBirth(ageInputEl, birthInput) {
      const v = (ageInputEl.value || "").trim();
      if (!v) return;
      birthInput.value = "";
      ageInputEl.readOnly = false;
    }

    function setPolicyHolderEnabled(enabled) {
      const els = policyHolderFields.querySelectorAll("input, select, textarea");
      els.forEach((el) => {
        el.disabled = !enabled;
      });
    }

    function clearPolicyHolderValues() {
      const els = policyHolderFields.querySelectorAll("input, select, textarea");

      els.forEach((el) => {
        if (el.type === "radio" || el.type === "checkbox") {
          el.checked = el.defaultChecked;
        } else if (el.tagName === "SELECT") {
          el.selectedIndex = 0;
        } else {
          el.value = "";
        }
      });

      if (holderAgeInput) holderAgeInput.readOnly = false;
    }

    function togglePolicyHolderFields() {
      if (sameAsInsuredCheckbox.checked) {
        clearPolicyHolderValues();
        setPolicyHolderEnabled(false);
        policyHolderFields.style.display = "none";
      } else {
        setPolicyHolderEnabled(true);
        policyHolderFields.style.display = "block";
        if (holderBirthDateInput && holderAgeInput) {
          applyBirthToAge(holderBirthDateInput, holderAgeInput);
        }
      }
    }

    sameAsInsuredCheckbox.addEventListener("change", togglePolicyHolderFields);
    togglePolicyHolderFields();

    birthDateInput.addEventListener("change", function () {
      applyBirthToAge(birthDateInput, ageInput);
    });

    ageInput.addEventListener("input", function () {
      applyAgeToBirth(ageInput, birthDateInput);
    });

    if (holderBirthDateInput && holderAgeInput) {
      holderBirthDateInput.addEventListener("change", function () {
        if (sameAsInsuredCheckbox.checked) return;
        applyBirthToAge(holderBirthDateInput, holderAgeInput);
      });

      holderAgeInput.addEventListener("input", function () {
        if (sameAsInsuredCheckbox.checked) return;
        applyAgeToBirth(holderAgeInput, holderBirthDateInput);
      });
    }

    form.addEventListener("submit", function (e) {
      const birthDate = (birthDateInput.value || "").trim();
      const age = (ageInput.value || "").trim();

      if (birthDate) {
        applyBirthToAge(birthDateInput, ageInput);
      } else if (age) {
        applyAgeToBirth(ageInput, birthDateInput);
      }

      if (!birthDate && !age) {
        e.preventDefault();
        alert("受保人的出生日期和投保年龄请至少填写一项。");
        return;
      }

      if (sameAsInsuredCheckbox.checked) {
        clearPolicyHolderValues();
        setPolicyHolderEnabled(false);
        policyHolderFields.style.display = "none";
        return;
      }

      const hb = (holderBirthDateInput?.value || "").trim();
      const ha = (holderAgeInput?.value || "").trim();

      if (hb) {
        applyBirthToAge(holderBirthDateInput, holderAgeInput);
      } else if (ha) {
        applyAgeToBirth(holderAgeInput, holderBirthDateInput);
      }

      if (!hb && !ha) {
        e.preventDefault();
        alert("投保人的出生日期和年龄请至少填写一项。");
        return;
      }
    });
  </script>
